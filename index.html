<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>准备好了吗 | Yi&Xin</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="start-page">
    <main class="start-screen" id="startScreen" aria-label="起始页">
      <section class="start-content">
        <h1>准备好了吗</h1>
        <button class="start-ready-button" id="readyButton" type="button">准备好了</button>
      </section>
    </main>

    <section class="site-frame-shell" id="siteFrameShell" hidden>
      <iframe class="site-frame" id="siteFrame" title="Yi&Xin's Anniversary"></iframe>
    </section>

    <audio id="startMusic" preload="auto"></audio>
    <div class="music-controls start-music-controls">
      <button class="music-toggle start-music-toggle" id="startMusicToggle" type="button" aria-label="切换背景音乐">
        <span class="music-icon">♪</span>
        <span class="music-text">爱の小曲：我们俩</span>
      </button>
      <button class="music-toggle start-music-toggle" id="startMusicPause" type="button" aria-label="暂停背景音乐">
        <span class="music-icon">♪</span>
      </button>
    </div>

    <script src="start.js"></script>
  </body>
</html>
